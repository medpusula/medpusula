<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedPusula</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #121212; color: #f0f0f0; transition: background 0.3s, color 0.3s; }
  .tag { background-color: #1f1f1f; padding: 4px 8px; border-radius: 8px; margin: 2px; display: inline-flex; align-items: center; transition: background 0.2s; }
  .tag:hover { background-color: #2a2a2a; }
  .tag button { margin-left: 4px; color: #ff4d4d; }
  input::placeholder { color: #888; }
  .suggestion { padding: 4px 8px; cursor: pointer; background: #1f1f1f; margin: 1px; border-radius: 6px; transition: background 0.2s; }
  .suggestion:hover { background: #2a2a2a; }
  .fade { transition: all 0.3s ease; }
</style>
</head>
<body class="flex flex-col min-h-screen">

<!-- Header -->
<header class="flex items-center justify-center py-6 border-b border-gray-700">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Medical_symbol.svg" alt="Medical Logo" class="h-16 mr-4">
  <h1 class="text-3xl font-bold">MedPusula</h1>
</header>

<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center p-6 w-full">
  <h2 class="text-xl mb-4">Semptom Risk Analizcisi</h2>
  <p class="text-gray-400 mb-4 text-center">Semptomunuzu yazın, risk seviyenizi öğrenin.</p>

  <!-- Input ve tag container -->
  <div class="w-full max-w-md relative">
    <div class="flex mb-2 flex-wrap" id="symptom-tags"></div>
    <input id="symptom-input" type="text" placeholder="Semptom ekle..." class="w-full p-3 rounded bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off"/>
    <div id="suggestion-box" class="absolute top-14 w-full bg-gray-900 rounded shadow-lg z-50 hidden"></div>
  </div>

  <!-- Risk output -->
  <div id="risk-output" class="mt-6 p-4 rounded bg-gray-900 w-full max-w-md text-center text-lg fade">
    Risk skoru burada görünecek...
  </div>
</main>

<!-- Footer -->
<footer class="mt-auto p-6 border-t border-gray-700 text-gray-400 text-sm text-center">
  <p>© MedPusula</p>
  <p>Sorumluluk reddi: Bu site yalnızca bilgi amaçlıdır ve profesyonel tıbbi tavsiye yerine geçmez.</p>
</footer>

<!-- JS -->
<script>
const input = document.getElementById('symptom-input');
const tagContainer = document.getElementById('symptom-tags');
const riskOutput = document.getElementById('risk-output');
const suggestionBox = document.getElementById('suggestion-box');

// Örnek veritabanı
let database = ["Baş ağrısı","Ateş","Bulantı","Yorgunluk"];
let symptoms = [...database];

// Tag display ve fade
function updateTags(){
  tagContainer.innerHTML = '';
  symptoms.forEach((symptom,index)=>{
    const tag = document.createElement('div');
    tag.className='tag fade';
    tag.innerText=symptom;
    const btn=document.createElement('button');
    btn.innerText='x';
    btn.onclick=()=>{
      symptoms.splice(index,1);
      updateTags();
      updateRisk();
    };
    tag.appendChild(btn);
    tagContainer.appendChild(tag);
  });
}

// Risk hesaplama + level + preventive tips
function updateRisk(){
  if(symptoms.length===0){ riskOutput.innerText='Risk skoru burada görünecek...'; return; }
  let risk=symptoms.length*10;
  risk=Math.min(risk,100);
  let level=risk<30?'Low':(risk<70?'Medium':'High');
  let tip=risk<30?'Genellikle düşük risk.':'';
  if(level==='Medium'){ tip='Orta risk, dikkat edin.'; }
  if(level==='High'){ tip='Yüksek risk, profesyonel tavsiye önerilir.'; }
  riskOutput.innerText=`Tahmini risk: ${risk}% (${level})\n${tip}`;
}

// Auto-suggest
function showSuggestions(text){
  suggestionBox.innerHTML='';
  if(!text){ suggestionBox.style.display='none'; return; }
  const filtered=database.filter(s=>s.toLowerCase().includes(text.toLowerCase()) && !symptoms.includes(s));
  if(filtered.length===0){ suggestionBox.style.display='none'; return; }
  filtered.forEach(s=>{
    const div=document.createElement('div');
    div.className='suggestion fade';
    div.innerText=s;
    div.onclick=()=>{
      if(!symptoms.includes(s)){ symptoms.push(s); updateTags(); updateRisk(); }
      input.value=''; suggestionBox.style.display='none';
    };
    suggestionBox.appendChild(div);
  });
  suggestionBox.style.display='block';
}

input.addEventListener('keyup',(e)=>{
  const val=input.value.trim();
  showSuggestions(val);
  if(e.key==='Enter' && val!==''){
    if(!database.includes(val)){ database.push(val); }
    if(!symptoms.includes(val)){ symptoms.push(val); }
    updateTags(); updateRisk();
    input.value=''; suggestionBox.style.display='none';
  }
});

document.addEventListener('click',(e)=>{
  if(!suggestionBox.contains(e.target) && e.target!==input){ suggestionBox.style.display='none'; }
});

// Başlangıç
updateTags();
updateRisk();
</script>

</body>
</html>
