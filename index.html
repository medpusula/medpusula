<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPusula | Klinik Branş Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* FOTOĞRAFTAKİ BEYAZ MODERN TASARIM (LIGHT MODE) */
        :root {
            --bg-light: #f3f4f6;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --accent-blue: #3b82f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger-red: #ef4444;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0; padding: 0;
            transition: 0.3s ease;
        }

        /* HEADER & NAV */
        header {
            background: var(--header-bg);
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; color: var(--accent-blue); }

        .nav-tabs {
            display: flex; justify-content: center; gap: 30px;
            background: var(--header-bg); border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
        }

        .tab { color: var(--text-muted); cursor: pointer; font-weight: 500; padding: 8px 12px; position: relative; }
        .tab.active { color: var(--accent-blue); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -11px; left: 0;
            width: 100%; height: 2px; background: var(--accent-blue);
        }

        /* ARAMA ALANI */
        .search-section { padding: 40px 10%; text-align: center; }
        .info-box {
            background: #dbeafe; color: #1e40af; padding: 12px;
            border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px;
            display: inline-block; width: 100%; max-width: 800px;
        }

        .search-bar {
            width: 100%; max-width: 800px; padding: 15px 45px;
            border-radius: 12px; border: 1px solid var(--border-color);
            font-size: 1rem; outline: none; transition: 0.3s;
        }

        /* KARTLAR */
        .grid-layout {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; padding: 0 10%; padding-bottom: 50px;
        }

        .med-card {
            background: var(--card-bg); border-radius: 16px; padding: 25px;
            border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative; transition: 0.3s;
        }

        .badge-dept { color: var(--accent-blue); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-emergency { 
            background: #fee2e2; color: #ef4444; font-size: 0.7rem; 
            font-weight: 700; padding: 4px 8px; border-radius: 6px; float: right;
        }

        .card-title { font-size: 1.25rem; font-weight: 700; margin: 12px 0 8px 0; }
        .card-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .emergency-border { border-color: rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

<header>
    <div class="logo">🩺 MedPusula</div>
    <div style="cursor:pointer">🌙</div>
</header>

<div class="nav-tabs">
    <div class="tab active">Semptom Analizi</div>
    <div class="tab">Hastalık & Tedavi</div>
    <div class="tab">İlaç Uyumu</div>
    <div class="tab">Vücut Analizi</div>
</div>

<div class="search-section">
    <div class="info-box">ℹ️ Semptomunuzu girerek hangi klinik branşa başvurmanız gerektiğini öğrenebilirsiniz.</div>
    <div style="position:relative; max-width:800px; margin: 0 auto;">
        <span style="position:absolute; left:15px; top:15px; color:#9ca3af">🔍</span>
        <input type="text" class="search-bar" id="mainSearch" placeholder="K..." onkeyup="filterData()">
    </div>
</div>

<div class="grid-layout" id="cardContainer">
    </div>

<script>
// --- DEV VERİ TABANI ALTYAPISI ---
const medData = [
    { n: "Karın Ağrısı (Sağ Alt)", d: "Genel Cerrahi", e: true, c: "Apandisit şüphesi! Baskıyla artan ağrıya dikkat." },
    { n: "Göğüs Sıkışması", d: "Kardiyoloji / Acil", e: true, c: "Kalp krizi riski! Sol kola yayılan ağrı var mı?" },
    { n: "Göz Kararması", d: "Dahiliye / Kardiyoloji", e: false, c: "Anemi (kansızlık) veya ani ortostatik hipotansiyon." },
    { n: "Unutkanlık", d: "Nöroloji", e: false, c: "B12 vitamini eksikliği veya erken evre bilişsel takip." },
    { n: "El/Ayak Uyuşması", d: "Nöroloji / Ortopedi", e: false, c: "Nöropati, sinir sıkışması veya disk kayması." },
    // Buraya 500+ veri eklenecek, motor hazır
];

function render(list) {
    const container = document.getElementById("cardContainer");
    container.innerHTML = list.map(item => `
        <div class="med-card ${item.e ? 'emergency-border' : ''}">
            <span class="badge-dept">${item.d}</span>
            ${item.e ? '<span class="badge-emergency">ACİL DURUM</span>' : ''}
            <div class="card-title">${item.n}</div>
            <div class="card-desc">${item.c}</div>
        </div>
    `).join("");
}

function filterData() {
    const q = document.getElementById("mainSearch").value.toLowerCase();
    const filtered = medData.filter(x => x.n.toLowerCase().includes(q) || x.d.toLowerCase().includes(q));
    render(filtered);
}

// Başlat
render(medData);
</script>

</body>
</html>
