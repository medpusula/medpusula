<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Semptom analizi ve dijital sağlık rehberi.">
    <title>MedPusula | Akıllı Sağlık Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: '#3b82f6', darkBg: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
        #bmi-pointer { transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <header class="bg-white dark:bg-darkSurface border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
                        <i class="fa-solid fa-notes-medical"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">MedPusula</h1>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="dark-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
            <nav class="flex justify-between overflow-x-auto no-scrollbar">
                <button onclick="switchTab('uzman')" id="btn-uzman" class="tab-btn px-4 py-3 text-sm font-semibold border-b-3 border-transparent active-tab text-primary">Semptom Bulucu</button>
                <button onclick="switchTab('rehber')" id="btn-rehber" class="tab-btn px-4 py-3 text-sm font-semibold border-b-3 border-transparent text-slate-500">Hastalık & İlaç</button>
                <button onclick="switchTab('etkilesim')" id="btn-etkilesim" class="tab-btn px-4 py-3 text-sm font-semibold border-b-3 border-transparent text-slate-500">Etkileşim</button>
                <button onclick="switchTab('hesaplar')" id="btn-hesaplar" class="tab-btn px-4 py-3 text-sm font-semibold border-b-3 border-transparent text-slate-500">Analiz</button>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pb-12">
        <section id="tab-uzman" class="tab-content active">
            <div class="space-y-6 pt-4">
                <div class="relative">
                    <input type="text" id="symptom-search" oninput="liveFilter('symptom')" class="w-full p-4 pl-12 rounded-2xl bg-white dark:bg-darkSurface border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary shadow-sm" placeholder="Semptom yazın (Örn: Karın ağrısı)...">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-5 text-slate-400"></i>
                </div>
                <div id="symptom-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="tab-rehber" class="tab-content">
            <div class="space-y-6 pt-4">
                <input type="text" id="disease-search" oninput="liveFilter('disease')" class="w-full p-4 pl-12 rounded-2xl bg-white dark:bg-darkSurface border border-slate-200 outline-none focus:ring-2 focus:ring-primary shadow-sm" placeholder="Hastalık arayın...">
                <div id="disease-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-etkilesim" class="tab-content">
            <div class="max-w-xl mx-auto py-6 space-y-4 text-center">
                <h2 class="text-xl font-bold italic">İlaç Etkileşim Sorgulama</h2>
                <input type="text" id="drug-1" class="w-full p-4 rounded-xl dark:bg-darkSurface border border-slate-200 outline-none" placeholder="1. İlaç/Besin">
                <input type="text" id="drug-2" class="w-full p-4 rounded-xl dark:bg-darkSurface border border-slate-200 outline-none" placeholder="2. İlaç/Besin">
                <button onclick="checkInteractions()" class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Kontrol Et</button>
                <div id="interaction-res"></div>
            </div>
        </section>

        <section id="tab-hesaplar" class="tab-content">
            <div class="max-w-xl mx-auto py-6 bg-white dark:bg-darkSurface p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl space-y-6">
                <h3 class="text-2xl font-bold text-center">Vücut Kitle İndeksi</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 flex gap-4">
                        <button onclick="setGender('E')" id="male-btn" class="flex-1 py-3 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-darkBg hover:border-primary transition-all font-bold">Erkek</button>
                        <button onclick="setGender('K')" id="female-btn" class="flex-1 py-3 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-darkBg hover:border-primary transition-all font-bold">Kadın</button>
                    </div>
                    <input type="number" id="h-age" placeholder="Yaş" class="p-4 rounded-2xl dark:bg-darkBg border border-slate-200 outline-none focus:ring-2 focus:ring-primary">
                    <input type="number" id="h-height" placeholder="Boy (cm)" class="p-4 rounded-2xl dark:bg-darkBg border border-slate-200 outline-none focus:ring-2 focus:ring-primary">
                    <input type="number" id="h-weight" placeholder="Kilo (kg)" class="p-4 rounded-2xl dark:bg-darkBg border border-slate-200 outline-none focus:ring-2 focus:ring-primary col-span-2">
                </div>

                <button onclick="calcHealth()" class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-transform">Hesapla</button>
                
                <div id="h-res" class="hidden space-y-6 pt-6 border-t border-slate-100 dark:border-slate-800">
                    <div class="flex justify-around items-center">
                        <div class="text-center"><div id="bmi-val" class="text-4xl font-black text-primary italic">--</div><div class="text-[10px] font-bold text-slate-400 uppercase">BMI Sonucu</div></div>
                        <div class="text-center"><div id="ideal-val" class="text-xl font-bold text-emerald-500">--</div><div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-nowrap">İdeal Kilonuz</div></div>
                    </div>
                    <div class="relative pt-6 px-2">
                        <div class="w-full h-3 bg-slate-100 dark:bg-darkBg rounded-full overflow-hidden flex">
                            <div class="h-full bg-blue-300 w-[18.5%]"></div>
                            <div class="h-full bg-emerald-400 w-[25%] border-x border-white/10"></div>
                            <div class="h-full bg-orange-400 w-[25%] border-r border-white/10"></div>
                            <div class="h-full bg-red-500 w-[31.5%]"></div>
                        </div>
                        <div id="bmi-pointer" class="w-5 h-5 bg-slate-800 dark:bg-white rounded-full shadow-xl absolute top-5 transform -translate-x-1/2 border-2 border-white dark:border-slate-800" style="left: 0%"></div>
                    </div>
                    <div id="bmi-status-box" class="p-4 rounded-2xl text-center text-sm font-medium italic"></div>
                </div>
            </div>
        </section>

        <footer class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
            <div class="bg-slate-100 dark:bg-slate-800/50 p-6 rounded-2xl text-[11px] leading-relaxed text-slate-500 dark:text-slate-400 max-w-2xl mx-auto mb-4">
                <p>Bu uygulama bilgilendirme amaçlıdır. Tıbbi tavsiye niteliği taşımaz. Acil durumlarda 112'yi arayın.</p>
            </div>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">MedPusula</p>
        </footer>
    </main>

    <script>
        let selectedGender = '';
        function setGender(g) {
            selectedGender = g;
            document.getElementById('male-btn').className = g === 'E' ? 'flex-1 py-3 rounded-xl border-2 border-primary bg-blue-50 dark:bg-blue-900/20 text-primary font-bold transition-all' : 'flex-1 py-3 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-darkBg font-bold transition-all';
            document.getElementById('female-btn').className = g === 'K' ? 'flex-1 py-3 rounded-xl border-2 border-primary bg-pink-50 dark:bg-pink-900/20 text-primary font-bold transition-all' : 'flex-1 py-3 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-darkBg font-bold transition-all';
        }

        const db = {
            symptoms: [
                { n: "Karın Ağrısı (Alt)", d: "Genel Cerrahi / Kadın Doğum", desc: "Apandisit veya bağırsak sorunları olabilir." },
                { n: "Karın Ağrısı (Üst)", d: "Gastroenteroloji / Dahiliye", desc: "Mide yanması, gastrit veya safra kesesi." },
                { n: "Göğüs Ağrısı", d: "ACİL / Kardiyoloji", desc: "Hayati risk! Hemen 112'yi arayınız.", urgent: true },
                { n: "Baş Ağrısı", d: "Nöroloji", desc: "Migren veya tansiyon kaynaklı olabilir." },
                { n: "Öksürük", d: "Göğüs Hastalıkları", desc: "Bronşit veya enfeksiyon belirtisi." }
            ],
            diseases: [{ n: "Grip", meds: "Parol, Tylolhot.", alt: "Bol C vitamini." }, { n: "Reflü", meds: "Gaviscon.", alt: "Yemekten sonra uzanmayın." }],
            interactions: [{ a: "aspirin", b: "alkol", r: "Yüksek", t: "Mide kanaması riski." }]
        };

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('dark-icon').className = document.documentElement.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active-tab', 'text-primary'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab', 'text-primary');
        }

        function liveFilter(type) {
            const input = document.getElementById(type + '-search').value.toLowerCase();
            const list = document.getElementById(type + '-list');
            list.innerHTML = ""; if (input.length < 1) return;
            const items = type === 'symptom' ? db.symptoms : db.diseases;
            items.filter(i => i.n.toLowerCase().includes(input)).forEach(i => {
                list.innerHTML += `<div class="${i.urgent ? 'border-red-500 bg-red-50 dark:bg-red-900/10' : 'bg-white dark:bg-darkSurface'} p-4 rounded-xl border animate-fadeIn">
                    <span class="text-[10px] text-primary font-bold uppercase">${i.d}</span>
                    <div class="font-bold text-lg">${i.n}</div>
                    <p class="text-xs text-slate-500 mt-1">${i.desc || i.meds}</p>
                </div>`;
            });
        }

        function calcHealth() {
            const h = parseFloat(document.getElementById('h-height').value);
            const w = parseFloat(document.getElementById('h-weight').value);
            const a = parseFloat(document.getElementById('h-age').value);
            if(!h || !w || !a || !selectedGender) { alert('Lütfen tüm alanları doldurun ve cinsiyet seçin.'); return; }
            
            const bmi = (w / ((h/100)**2)).toFixed(1);
            const res = document.getElementById('h-res'); res.classList.remove('hidden');
            document.getElementById('bmi-val').innerText = bmi;
            document.getElementById('ideal-val').innerText = `${(18.5*((h/100)**2)).toFixed(0)}-${(24.9*((h/100)**2)).toFixed(0)} kg`;
            
            let percent = ((bmi - 15) / (40 - 15)) * 100;
            document.getElementById('bmi-pointer').style.left = `${Math.max(0, Math.min(100, percent))}%`;
            
            const box = document.getElementById('bmi-status-box');
            if(bmi < 18.5) { box.className = "p-4 rounded-2xl bg-blue-50 text-blue-700 text-xs"; box.innerText = "Zayıf: Beslenmenize dikkat etmelisiniz."; }
            else if(bmi < 25) { box.className = "p-4 rounded-2xl bg-emerald-50 text-emerald-700 text-xs"; box.innerText = "Normal: İdeal formdasınız!"; }
            else if(bmi < 30) { box.className = "p-4 rounded-2xl bg-orange-50 text-orange-700 text-xs"; box.innerText = "Fazla Kilolu: Egzersiz önerilir."; }
            else { box.className = "p-4 rounded-2xl bg-red-50 text-red-700 text-xs"; box.innerText = "Obezite: Bir uzmana danışmalısınız."; }
        }

        function checkInteractions() {
            const d1 = document.getElementById('drug-1').value.toLowerCase(), d2 = document.getElementById('drug-2').value.toLowerCase();
            const res = document.getElementById('interaction-res');
            const match = db.interactions.find(i => (i.a.includes(d1) && i.b.includes(d2)) || (i.a.includes(d2) && i.b.includes(d1)));
            res.innerHTML = match ? `<div class="p-4 mt-4 bg-red-100 text-red-700 rounded-xl text-xs">⚠️ <b>${match.r} Risk:</b> ${match.t}</div>` : `<div class="p-4 mt-4 bg-blue-100 text-blue-700 rounded-xl text-xs font-bold">Risk saptanmadı.</div>`;
        }
    </script>
</body>
</html>
