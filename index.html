<section id="tab-hesaplar" class="tab-content">
    <div class="max-w-xl mx-auto py-6 bg-white dark:bg-darkSurface p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl space-y-6">
        <div class="text-center">
            <h3 class="text-2xl font-bold text-slate-800 dark:text-white">Vücut Analiz Laboratuvarı</h3>
            <p class="text-sm text-slate-500 mt-1">Geleceğin cerrahından bilimsel ölçümler</p>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Boyunuz (cm)</label>
                <input type="number" id="h-height" placeholder="175" class="w-full p-4 rounded-2xl dark:bg-darkBg border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Kilonuz (kg)</label>
                <input type="number" id="h-weight" placeholder="70" class="w-full p-4 rounded-2xl dark:bg-darkBg border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary transition-all">
            </div>
        </div>

        <button onclick="calcHealth()" class="w-full py-4 bg-gradient-to-r from-blue-500 to-blue-700 text-white font-bold rounded-2xl shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95">
            Analizi Başlat <i class="fa-solid fa-microscope ml-2"></i>
        </button>

        <div id="h-res" class="hidden animate-fadeIn space-y-6 border-t border-slate-100 dark:border-slate-800 pt-6">
            <div class="flex justify-around items-center">
                <div class="text-center">
                    <div id="bmi-val" class="text-5xl font-black text-primary italic">22.4</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">BMI Endeksi</div>
                </div>
                <div class="h-12 w-[1px] bg-slate-200 dark:bg-slate-700"></div>
                <div class="text-center">
                    <div id="ideal-val" class="text-2xl font-bold text-emerald-500">68 - 72</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-nowrap">İdeal Kilo Aralığı</div>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase px-1">
                    <span>Zayıf</span>
                    <span>Normal</span>
                    <span>Kilolu</span>
                    <span>Obez</span>
                </div>
                <div class="w-full h-3 bg-slate-100 dark:bg-darkBg rounded-full overflow-hidden flex">
                    <div class="h-full bg-blue-300 w-[18.5%]"></div>
                    <div class="h-full bg-emerald-400 w-[25%] border-x border-white/20"></div>
                    <div class="h-full bg-orange-400 w-[25%] border-r border-white/20"></div>
                    <div class="h-full bg-red-500 w-[31.5%]"></div>
                </div>
                <div id="bmi-pointer" class="w-3 h-3 bg-slate-800 dark:bg-white rounded-full shadow-md transition-all duration-1000 -mt-5 relative z-10 border-2 border-white dark:border-slate-800" style="margin-left: 0%"></div>
            </div>

            <div id="bmi-status-box" class="p-4 rounded-2xl text-center text-sm font-medium transition-all">
                </div>
        </div>
    </div>
</section>

<script>
// Mevcut script içine şu fonksiyonu güncelle veya ekle
function calcHealth() {
    const h = parseFloat(document.getElementById('h-height').value);
    const w = parseFloat(document.getElementById('h-weight').value);
    const res = document.getElementById('h-res');
    
    if(!h || !w) return;

    const bmi = (w / ((h/100)**2)).toFixed(1);
    const idealMin = (18.5 * ((h/100)**2)).toFixed(0);
    const idealMax = (24.9 * ((h/100)**2)).toFixed(0);
    
    res.classList.remove('hidden');
    document.getElementById('bmi-val').innerText = bmi;
    document.getElementById('ideal-val').innerText = `${idealMin} - ${idealMax} kg`;

    // Grafik İbresini Hareket Ettirme (BMI 15 ile 40 arası normalize edildi)
    let percent = ((bmi - 15) / (40 - 15)) * 100;
    percent = Math.max(5, Math.min(95, percent)); // Sınırları koru
    document.getElementById('bmi-pointer').style.marginLeft = `${percent}%`;

    const statusBox = document.getElementById('bmi-status-box');
    if(bmi < 18.5) {
        statusBox.className = "p-4 rounded-2xl text-center text-sm font-medium bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-300";
        statusBox.innerText = "Vücut ağırlığınız boyunuza göre az. Beslenmenize dikkat etmelisiniz.";
    } else if(bmi < 25) {
        statusBox.className = "p-4 rounded-2xl text-center text-sm font-medium bg-emerald-50 text-emerald-700 dark:bg-emerald-900/20 dark:text-emerald-300";
        statusBox.innerText = "Tebrikler! İdeal kilodasınız. Formunuzu korumaya devam edin.";
    } else if(bmi < 30) {
        statusBox.className = "p-4 rounded-2xl text-center text-sm font-medium bg-orange-50 text-orange-700 dark:bg-orange-900/20 dark:text-orange-300";
        statusBox.innerText = "Hafif kilolu kategorisindesiniz. Dengeli diyet ve egzersiz önerilir.";
    } else {
        statusBox.className = "p-4 rounded-2xl text-center text-sm font-medium bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-300";
        statusBox.innerText = "Sağlık riskleri oluşabilir. Bir beslenme uzmanına danışmanız faydalı olabilir.";
    }
}
</script>
