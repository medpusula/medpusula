<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPusula Pro | Kapsamlı Klinik Matris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: '#3b82f6', darkBg: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { color: #3b82f6 !important; border-bottom: 3px solid #3b82f6 !important; background-color: rgba(59, 130, 246, 0.08); font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-500">

    <header class="bg-white/90 dark:bg-darkSurface/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30">
                        <i class="fa-solid fa-staff-snake text-lg"></i>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase italic">MedPusula</h1>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800">
                    <i id="dark-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
            <nav class="flex gap-4 overflow-x-auto no-scrollbar border-t dark:border-slate-800">
                <button onclick="switchTab('uzman')" id="btn-uzman" class="tab-btn px-4 py-4 text-[10px] font-black uppercase tracking-[0.15em] border-b-2 border-transparent active-tab shrink-0">Semptom Rehberi</button>
                <button onclick="switchTab('hesaplar')" id="btn-hesaplar" class="tab-btn px-4 py-4 text-[10px] font-black uppercase tracking-[0.15em] border-b-2 border-transparent text-slate-500 shrink-0">Vücut Endeksleri</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 pb-16">
        
        <section id="tab-uzman" class="tab-content active">
            <div class="space-y-6 pt-4">
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="filterCategory('Tümü')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-primary text-white text-[9px] font-black uppercase tracking-widest shadow-lg">Tümü</button>
                    <button onclick="filterCategory('Kafa & Saç')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800">Kafa & Saç</button>
                    <button onclick="filterCategory('Göz & Kulak')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800">Göz & Kulak</button>
                    <button onclick="filterCategory('Gövde')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800">Gövde & Organlar</button>
                    <button onclick="filterCategory('Kollar & Bacaklar')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800">Kollar & Bacaklar</button>
                    <button onclick="filterCategory('Cilt')" class="cat-btn shrink-0 px-6 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800">Cilt & Estetik</button>
                </div>

                <div class="relative">
                    <input type="text" id="symptom-search" oninput="renderSymptoms()" class="w-full p-6 pl-14 rounded-3xl bg-white dark:bg-darkSurface border-2 border-slate-100 dark:border-slate-800 outline-none focus:border-primary shadow-xl text-lg transition-all" placeholder="Şikayet arayın (Örn: Saç dökülmesi, Karın ağrısı)...">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-7 text-slate-300"></i>
                </div>
                
                <div id="symptom-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="tab-hesaplar" class="tab-content">
            <div class="max-w-xl mx-auto py-6 bg-white dark:bg-darkSurface p-8 rounded-[2.5rem] shadow-2xl space-y-8 border border-slate-100 dark:border-slate-800">
                <h3 class="text-2xl font-black text-center italic uppercase tracking-tighter">Vücut Kompozisyonu</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 flex gap-4">
                        <button onclick="setGender('E')" id="male-btn" class="flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]">Erkek</button>
                        <button onclick="setGender('K')" id="female-btn" class="flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]">Kadın</button>
                    </div>
                    <div class="space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Yaş</label><input type="number" id="h-age" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                    <div class="space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Boy (cm)</label><input type="number" id="h-height" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                    <div class="col-span-2 space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Kilo (kg)</label><input type="number" id="h-weight" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                </div>
                <button onclick="calcHealth()" class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-xl hover:brightness-110 active:scale-95 transition-all text-xs uppercase tracking-widest">Analizi Başlat</button>
                <div id="h-res" class="hidden pt-10 space-y-8 border-t-2 border-slate-50 dark:border-slate-800 animate-fadeIn text-center">
                    <div><div id="bmi-val" class="text-6xl font-black text-primary italic">--</div><div class="text-[9px] font-bold text-slate-400 mt-2 uppercase">VKE</div></div>
                    <div id="bmi-status-box" class="p-6 rounded-2xl text-[11px] border shadow-sm">--</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-8 bg-slate-900 text-slate-500 text-center border-t border-slate-800">
        <p class="text-[10px] font-bold uppercase tracking-[0.4em]">© 2026 Klinik Karar Destek Sistemi</p>
    </footer>

    <script>
        let currentCategory = 'Tümü';
        let selectedGender = '';

        const db = {
            symptoms: [
                // KAFA & SAÇ
                { n: "Aşırı Saç Dökülmesi", c: "Kafa & Saç", d: "Dermatoloji", desc: "Günde 100 telden fazla kayıp; hormonal veya vitamin kaynaklı olabilir.", urgent: false },
                { n: "Saç Kıran", c: "Kafa & Saç", d: "Dermatoloji", desc: "Saçta dairesel boşluklar; bağışıklık sistemi tepkisidir.", urgent: false },
                { n: "Baş Dönmesi (Vertigo)", c: "Kafa & Saç", d: "KBB / Nöroloji", desc: "Etrafın dönmesi hissi, denge kaybı; iç kulak kristalleri kaynaklı olabilir.", urgent: false },
                { n: "Ani Şiddetli Baş Ağrısı", c: "Kafa & Saç", d: "Nöroloji / ACİL", desc: "Çok şiddetli ve ani başlayan ağrı; tansiyon veya beyin kanaması riski.", urgent: true },
                { n: "Unutkanlık ve Dalgınlık", c: "Kafa & Saç", d: "Nöroloji", desc: "Günlük işleri unutma; vitamin eksikliği veya stres kaynaklı olabilir.", urgent: false },

                // GÖZ & KULAK
                { n: "Gözde Kanlanma", c: "Göz & Kulak", d: "Göz Hastalıkları", desc: "Enfeksiyon (Konjonktivit) veya göz tansiyonu belirtisi olabilir.", urgent: false },
                { n: "Göz Kararması", c: "Göz & Kulak", d: "Kardiyoloji", desc: "Özellikle ani ayağa kalkışta oluşuyorsa düşük tansiyon belirtisidir.", urgent: false },
                { n: "Kulak Çınlaması", c: "Göz & Kulak", d: "KBB", desc: "Sürekli veya kesik çınlama; yüksek ses maruziyeti veya kulak kiri.", urgent: false },
                { n: "Göz Seğirmesi", c: "Göz & Kulak", d: "Göz / Nöroloji", desc: "Göz kapağının istemsiz hareketi; yorgunluk, stres veya magnezyum eksikliği.", urgent: false },

                // GÖVDE & ORGANLAR
                { n: "Sağ Alt Karın Ağrısı", c: "Gövde", d: "Genel Cerrahi / ACİL", desc: "Apandisit şüphesi; karın bölgesine basınca artan şiddetli ağrı.", urgent: true },
                { n: "Göğüste Baskı ve Yanma", c: "Gövde", d: "Kardiyoloji / ACİL", desc: "Kalp krizi riski; sol kola veya çeneye vuran ağrı.", urgent: true },
                { n: "Sırtta Keskin Ağrı", c: "Gövde", d: "Fizik Tedavi", desc: "Fıtık veya kas spazmı; nefes alırken batma yapıyorsa akciğer kontrolü.", urgent: false },
                { n: "Mide Yanması (Reflü)", c: "Gövde", d: "Gastroenteroloji", desc: "Yemekten sonra göğüs arkasında yanma hissi; asitli gıda kısıtlanmalı.", urgent: false },
                { n: "Sürekli Öksürük", c: "Gövde", d: "Göğüs Hastalıkları", desc: "3 haftadan uzun süren öksürük; akciğer filmi çekilmelidir.", urgent: false },

                // KOLLAR & BACAKLAR
                { n: "Bacaklarda Varis", c: "Kollar & Bacaklar", d: "Kalp Damar Cerrahi", desc: "Damarların belirginleşmesi ve ağrı; kan dolaşımı sorunudur.", urgent: false },
                { n: "Dizlerde Çıtırdama", c: "Kollar & Bacaklar", d: "Ortopedi", desc: "Hareketle gelen ses; kıkırdak aşınması veya sıvı kaybı olabilir.", urgent: false },
                { n: "Ayak Bileği Şişmesi", c: "Kollar & Bacaklar", d: "Dahiliye / Kardiyoloji", desc: "Ödem; kalp yetmezliği veya böbrek sorunları belirtisi olabilir.", urgent: false },
                { n: "Topuk Dikeni", c: "Kollar & Bacaklar", d: "Ortopedi", desc: "Sabah ilk adımda topukta batma hissi; tabanlık kullanımı gerekebilir.", urgent: false },

                // CİLT & ESTETİK (PLASTİK CERRAHİ ODAKLI)
                { n: "Yara İzinde Kabarma (Keloid)", c: "Cilt", d: "Plastik Cerrahi", desc: "İyileşen yaranın aşırı büyüyerek sertleşmesi.", urgent: false },
                { n: "Benlerde Renk Değişimi", c: "Cilt", d: "Dermatoloji", desc: "Asimetrik büyüyen benler; Cilt kanseri riski açısından kritiktir.", urgent: true },
                { n: "Ciltte Kuruma ve Çatlama", c: "Cilt", d: "Dermatoloji", desc: "Egzama veya nemsizlik; bariyer koruyucu kremler önerilir.", urgent: false },
                { n: "Yüzde Sivilce İzleri", c: "Cilt", d: "Estetik Cerrahi / Dermatoloji", desc: "Akne sonrası kalan skarlar; lazer veya peeling tedavisi gerekebilir.", urgent: false }
            ]
        };

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('active-tab'); el.classList.add('text-slate-500'); });
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = 'cat-btn shrink-0 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest border border-slate-100 dark:border-slate-800 dark:bg-darkSurface text-slate-500';
                if(btn.innerText === cat.toUpperCase()) btn.className = 'cat-btn shrink-0 px-6 py-2 rounded-full bg-primary text-white text-[9px] font-black uppercase tracking-widest shadow-lg';
            });
            renderSymptoms();
        }

        function renderSymptoms() {
            const val = document.getElementById('symptom-search').value.toLowerCase();
            const list = document.getElementById('symptom-list');
            list.innerHTML = "";
            const filtered = db.symptoms.filter(s => (currentCategory === 'Tümü' || s.c === currentCategory) && (s.n.toLowerCase().includes(val) || s.desc.toLowerCase().includes(val)));
            
            filtered.forEach(s => {
                const style = s.urgent ? 'border-red-500 bg-red-50 dark:bg-red-900/10' : 'bg-white dark:bg-darkSurface border-slate-100 dark:border-slate-800 shadow-lg';
                list.innerHTML += `<div class="${style} p-5 rounded-3xl border transition-all animate-fadeIn">
                    <div class="flex justify-between mb-2">
                        <span class="text-[8px] bg-primary/10 text-primary px-2 py-0.5 rounded-lg font-black uppercase">${s.d}</span>
                        ${s.urgent ? '<span class="text-[8px] bg-red-600 text-white px-2 py-0.5 rounded-lg font-black animate-pulse">ACİL</span>' : ''}
                    </div>
                    <div class="font-bold text-lg">${s.n}</div>
                    <p class="text-[10px] text-slate-500 mt-2 font-medium leading-relaxed">${s.desc}</p>
                </div>`;
            });
        }
        renderSymptoms();

        function setGender(g) { 
            selectedGender = g;
            document.getElementById('male-btn').className = g === 'E' ? 'flex-1 py-4 rounded-2xl border-2 border-primary bg-blue-500/10 text-primary font-black uppercase text-[10px]' : 'flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]';
            document.getElementById('female-btn').className = g === 'K' ? 'flex-1 py-4 rounded-2xl border-2 border-primary bg-pink-500/10 text-primary font-black uppercase text-[10px]' : 'flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]';
        }

        function calcHealth() {
            const h = document.getElementById('h-height').value / 100, w = document.getElementById('h-weight').value;
            if(!h || !w || !selectedGender) return alert('Verileri girin.');
            const bmi = (w / (h*h)).toFixed(1);
            document.getElementById('h-res').classList.remove('hidden');
            document.getElementById('bmi-val').innerText = bmi;
            document.getElementById('bmi-status-box').className = `p-6 rounded-2xl text-[11px] border ${bmi < 25 && bmi >= 18.5 ? 'bg-emerald-50 text-emerald-800' : 'bg-red-50 text-red-800'}`;
            document.getElementById('bmi-status-box').innerHTML = `Sonuç: <strong>${bmi < 25 ? 'Normal' : 'Risk'}</strong>. Klinik verilere göre analiz tamamlandı.`;
        }
    </script>
</body>
</html>
