<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPusula | Klinik Rehber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: '#3b82f6', darkBg: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { color: #3b82f6 !important; border-bottom: 3px solid #3b82f6 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .suggestion-box { position: absolute; width: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; margin-top: 0.25rem; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dark .suggestion-box { background: #1e293b; border-color: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <header class="bg-white dark:bg-darkSurface border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white"><i class="fa-solid fa-staff-snake"></i></div>
                    <h1 class="text-xl font-bold tracking-tight">MedPusula</h1>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="dark-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
            <nav class="flex justify-between overflow-x-auto no-scrollbar border-t dark:border-slate-800">
                <button onclick="switchTab('uzman')" id="btn-uzman" class="tab-btn px-4 py-3 text-sm font-semibold border-b-2 border-transparent active-tab text-primary">Semptom Analizi</button>
                <button onclick="switchTab('rehber')" id="btn-rehber" class="tab-btn px-4 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500">Hastalık Rehberi</button>
                <button onclick="switchTab('etkilesim')" id="btn-etkilesim" class="tab-btn px-4 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500">İlaç & Vitamin</button>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <section id="tab-uzman" class="tab-content active pt-4">
            <div class="relative mb-6">
                <input type="text" id="symptom-search" oninput="showLiveSearch('symptom')" class="w-full p-5 pl-12 rounded-2xl bg-white dark:bg-darkSurface border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary shadow-lg text-lg" placeholder="Şikayetinizi yazın (Örn: Baş dönmesi)...">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-6 text-slate-400"></i>
                <div id="symptom-res" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="tab-rehber" class="tab-content pt-4">
            <div class="relative mb-6">
                <input type="text" id="disease-search" oninput="showLiveSearch('disease')" class="w-full p-5 pl-12 rounded-2xl bg-white dark:bg-darkSurface border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary shadow-lg text-lg" placeholder="Hastalık ismi arayın...">
                <i class="fa-solid fa-stethoscope absolute left-4 top-6 text-slate-400"></i>
                <div id="disease-res" class="mt-6 space-y-4"></div>
            </div>
        </section>

        <section id="tab-etkilesim" class="tab-content pt-4">
            <div class="max-w-xl mx-auto space-y-4">
                <div class="relative">
                    <input type="text" id="drug-1" oninput="showAutocomplete('drug-1')" class="w-full p-4 rounded-xl dark:bg-darkSurface border border-slate-200 outline-none focus:ring-2 focus:ring-primary shadow-sm" placeholder="1. Madde (Örn: Magnezyum)">
                    <div id="sugg-1" class="suggestion-box hidden"></div>
                </div>
                <div class="relative">
                    <input type="text" id="drug-2" oninput="showAutocomplete('drug-2')" class="w-full p-4 rounded-xl dark:bg-darkSurface border border-slate-200 outline-none focus:ring-2 focus:ring-primary shadow-sm" placeholder="2. Madde (Örn: Antibiyotik)">
                    <div id="sugg-2" class="suggestion-box hidden"></div>
                </div>
                <button onclick="checkInteractions()" class="w-full py-5 bg-primary text-white font-bold rounded-2xl shadow-xl active:scale-95 transition-all">Analiz Et</button>
                <div id="interaction-res"></div>
            </div>
        </section>
    </main>

    <script>
        // BURAYA İSTEDİĞİN KADAR (2000+) VERİ EKLEYEBİLİRSİN
        const db = {
            symptoms: [
                { n: "Baş Dönmesi", d: "Nöroloji / KBB", desc: "Vertigo, iç kulak sorunları veya ani tansiyon değişimi.", urgent: false },
                { n: "Göz Seğirmesi", d: "Nöroloji", desc: "Genelde stres, uykusuzluk veya magnezyum eksikliği.", urgent: false },
                { n: "Göğüs Sıkışması", d: "Kardiyoloji / Acil", desc: "Baskı ve nefes darlığı varsa acil tıbbi destek gerekebilir.", urgent: true },
                { n: "Avuç İçi Yanması", d: "Dahiliye / Nöroloji", desc: "B12 eksikliği veya diyabetik nöropati belirtisi olabilir.", urgent: false },
                { n: "Gece Terlemesi", d: "Dahiliye", desc: "Enfeksiyon, tiroid veya hormonal süreçler takip edilmeli.", urgent: false },
                { n: "Unutkanlık", d: "Nöroloji", desc: "Vitamin eksikliği veya bilişsel yorgunluk odaklı olabilir.", urgent: false },
                { n: "Eklem Ağrısı", d: "Romatoloji", desc: "Romatizmal süreçler veya kireçlenme ihtimali.", urgent: false }
                // Kalanları aynı formatta ekleyebilirsin.
            ],
            diseases: [
                { n: "Migren", meds: "Ağrı kesiciler, triptan grubu ilaçlar.", alt: "Karanlık oda istirahati, bol sıvı tüketimi." },
                { n: "Gastrit", meds: "Antiasitler, mide koruyucular.", alt: "Az yağlı beslenme, asitli içeceklerden kaçınma." },
                { n: "Anemi", meds: "Demir takviyeleri, B12 vitaminleri.", alt: "Kırmızı et, pekmez ve C vitamini desteği." }
            ],
            interactions: [
                { a: "magnezyum", b: "antibiyotik", r: "Kritik", t: "Antibiyotik emilimini tamamen bozabilir. En az 4 saat ara verin." },
                { a: "c vitamini", b: "demir", r: "Destekleyici", t: "C vitamini demir emilimini artırarak tedaviyi hızlandırır." },
                { a: "çay", b: "demir", r: "Kritik", t: "Çaydaki tanenler demir emilimini %50'den fazla düşürür." },
                { a: "alkol", b: "parasetamol", r: "Yüksek", t: "Karaciğer üzerinde ciddi toksik etki riski oluşturur." }
            ]
        };

        function showLiveSearch(type) {
            const val = document.getElementById(type + '-search').value.toLowerCase().trim();
            const res = document.getElementById(type + '-res');
            res.innerHTML = "";
            if(val.length < 1) return;

            const items = type === 'symptom' ? db.symptoms : db.diseases;
            items.filter(i => i.n.toLowerCase().includes(val)).forEach(i => {
                const style = i.urgent ? 'border-red-500 bg-red-50 dark:bg-red-900/10' : 'bg-white dark:bg-darkSurface border-slate-200 dark:border-slate-700';
                res.innerHTML += `
                    <div class="${style} p-5 rounded-2xl border animate-fadeIn shadow-sm">
                        <span class="text-[10px] font-bold text-primary uppercase tracking-widest">${i.d || 'REHBER'}</span>
                        <h4 class="font-bold text-lg mb-1">${i.n}</h4>
                        <p class="text-xs opacity-60">${i.desc || i.meds}</p>
                    </div>`;
            });
        }

        function showAutocomplete(id) {
            const val = document.getElementById(id).value.toLowerCase().trim();
            const box = document.getElementById('sugg-' + id.split('-')[1]);
            const all = [...new Set(db.interactions.flatMap(x => [x.a, x.b]))];
            const matches = all.filter(x => x.includes(val));

            if(val.length > 0 && matches.length > 0) {
                box.innerHTML = matches.map(m => `<div class="p-3 hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer text-sm" onclick="selectSugg('${id}','${m}')">${m.toUpperCase()}</div>`).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function selectSugg(id, val) {
            document.getElementById(id).value = val.toUpperCase();
            document.querySelectorAll('.suggestion-box').forEach(b => b.classList.add('hidden'));
        }

        function checkInteractions() {
            const d1 = document.getElementById('drug-1').value.toLowerCase().trim();
            const d2 = document.getElementById('drug-2').value.toLowerCase().trim();
            const match = db.interactions.find(i => (i.a.includes(d1) && i.b.includes(d2)) || (i.a.includes(d2) && i.b.includes(d1)));
            const res = document.getElementById('interaction-res');
            if(!d1 || !d2) return;
            res.innerHTML = match ? `<div class="p-5 bg-orange-50 dark:bg-orange-900/20 text-orange-700 dark:text-orange-300 rounded-2xl border border-orange-200 animate-fadeIn"><b class="text-xs uppercase">${match.r} DURUM:</b><p class="text-sm mt-1">${match.t}</p></div>` : `<div class="p-5 bg-blue-50 dark:bg-blue-900/20 text-blue-700 rounded-2xl text-center border border-blue-100 animate-fadeIn italic">Kritik bir etkileşim kaydı saptanmadı.</div>`;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('active-tab', 'text-primary'); el.classList.add('text-slate-500'); });
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab', 'text-primary');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('dark-icon').className = document.documentElement.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        document.addEventListener('click', (e) => { if (!e.target.closest('.relative')) document.querySelectorAll('.suggestion-box').forEach(b => b.classList.add('hidden')); });
    </script>
</body>
</html>
