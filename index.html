<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPusula | Profesyonel Sağlık Portalı</title>
    <style>
        /* MODERN DARK MODE TASARIMI */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* ETKİLEŞİM PANELİ */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #interaction-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MedPusula</h1>
        <p>Bilimsel Veri Odaklı Sağlık Rehberi</p>
    </div>

    <div class="card">
        <h3>İlaç Etkileşim Kontrolü</h3>
        <p style="font-size: 0.9rem; color: #94a3b8;">Kontrol etmek istediğiniz iki ilacı giriniz (Örn: Aspirin, Coumadin)</p>
        <input type="text" id="drug1" placeholder="1. İlaç Adı...">
        <input type="text" id="drug2" placeholder="2. İlaç Adı...">
        <button onclick="checkInteraction()">Etkileşimi Analiz Et</button>
        <div id="interaction-result"></div>
    </div>

    <div class="card">
        <h3>Semptom Analizi</h3>
        <input type="text" id="symptom-input" placeholder="Belirti girin (Örn: Baş ağrısı)..." onkeyup="searchSymptom()">
        <div id="symptom-results"></div>
    </div>

    <div class="footer">
        Veri Kaynağı: PubMed & FDA Open Drug Data | Bu bir 10. Sınıf Akademik Projesidir.
    </div>
</div>

<script>
// --- DEV TIBBİ VERİ TABANI (500+ VERİ İÇİN ALTYAPI) ---
const medDatabase = {
    drugs: [
        { id: 1, name: "Aspirin", interactions: [2, 5], warning: "DİKKAT: Ciddi mide kanaması ve pıhtılaşma bozukluğu riski!" },
        { id: 2, name: "Coumadin", interactions: [1, 3], warning: "TEHLİKE: Kan sulandırıcıların birlikte kullanımı hayati risk taşır." },
        { id: 3, name: "Coraspin", interactions: [2], warning: "DİKKAT: Diğer antikoagülanlarla etkileşime girer." },
        { id: 4, name: "Parol", interactions: [], warning: "Bilinen ciddi etkileşim yok; alkolle karaciğer riski." },
        { id: 5, name: "Arveles", interactions: [1, 2], warning: "DİKKAT: NSAİİ grubu ilaçlar kanama riskini artırır." },
        // Buraya 500+ ilacı aynı formatta ekleyebilirsin Uğur.
    ],
    symptoms: [
        { name: "Baş Ağrısı", related: "Hipertansiyon, Migren, Dehidrasyon" },
        { name: "Yüksek Ateş", related: "Enfeksiyon, Grip, İnflamasyon" },
        { name: "Mide Yanması", related: "Gastrit, Reflü, Ülser" }
    ]
};

// --- ETKİLEŞİM MOTORU ---
function checkInteraction() {
    const d1Name = document.getElementById("drug1").value.trim().toLowerCase();
    const d2Name = document.getElementById("drug2").value.trim().toLowerCase();
    const resultDiv = document.getElementById("interaction-result");

    const drug1 = medDatabase.drugs.find(d => d.name.toLowerCase() === d1Name);
    const drug2 = medDatabase.drugs.find(d => d.name.toLowerCase() === d2Name);

    if (!drug1 || !drug2) {
        resultDiv.innerHTML = "❌ Geçersiz veya veritabanında olmayan ilaç ismi.";
        resultDiv.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
        resultDiv.style.color = "#ef4444";
        return;
    }

    if (drug1.interactions.includes(drug2.id)) {
        resultDiv.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
        resultDiv.style.color = "#ef4444";
        resultDiv.innerHTML = `⚠️ ${drug1.warning}`;
    } else {
        resultDiv.style.backgroundColor = "rgba(34, 197, 94, 0.2)";
        resultDiv.style.color = "#22c55e";
        resultDiv.innerHTML = "✅ Bu iki ilaç arasında bilinen ciddi bir etkileşim saptanmadı.";
    }
}

// --- SEMPTOM MOTORU ---
function searchSymptom() {
    const input = document.getElementById("symptom-input").value.toLowerCase();
    const res = document.getElementById("symptom-results");
    if(input === "") { res.innerHTML = ""; return; }

    const found = medDatabase.symptoms.filter(s => s.name.toLowerCase().includes(input));
    res.innerHTML = found.map(s => `
        <div style="padding:10px; border-bottom:1px solid #334155;">
            <strong style="color:var(--accent-color)">${s.name}</strong><br>
            <small>Olası İlişkili Durumlar: ${s.related}</small>
        </div>
    `).join("");
}
</script>

</body>
</html>
