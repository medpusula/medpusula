<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPusula Pro | Klinik Veri Matrisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: '#3b82f6', darkBg: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { color: #3b82f6 !important; border-bottom: 3px solid #3b82f6 !important; background-color: rgba(59, 130, 246, 0.08); font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #bmi-pointer { transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-500">

    <header class="bg-white/90 dark:bg-darkSurface/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30">
                        <i class="fa-solid fa-staff-snake text-lg"></i>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tighter">MedPusula <span class="text-primary italic">Pro</span></h1>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800">
                    <i id="dark-icon" class="fa-solid fa-moon text-sm"></i>
                </button>
            </div>
            <nav class="flex justify-between overflow-x-auto no-scrollbar border-t dark:border-slate-800">
                <button onclick="switchTab('uzman')" id="btn-uzman" class="tab-btn px-4 py-4 text-[10px] font-black uppercase tracking-[0.15em] border-b-2 border-transparent active-tab">Semptom Analizi</button>
                <button onclick="switchTab('rehber')" id="btn-rehber" class="tab-btn px-4 py-4 text-[10px] font-black uppercase tracking-[0.15em] border-b-2 border-transparent text-slate-500">Hastalık Rehberi</button>
                <button onclick="switchTab('hesaplar')" id="btn-hesaplar" class="tab-btn px-4 py-4 text-[10px] font-black uppercase tracking-[0.15em] border-b-2 border-transparent text-slate-500">Vücut Endeksleri</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 pb-16">
        
        <section id="tab-uzman" class="tab-content active">
            <div class="space-y-6 pt-4">
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="filterCategory('Tümü')" class="cat-btn shrink-0 px-5 py-2 rounded-full bg-primary text-white text-[10px] font-bold uppercase tracking-widest shadow-lg">Tümü</button>
                    <button onclick="filterCategory('Baş & Saç')" class="cat-btn shrink-0 px-5 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[10px] font-bold uppercase tracking-widest border border-slate-100">Baş & Saç</button>
                    <button onclick="filterCategory('Göğüs & Kalp')" class="cat-btn shrink-0 px-5 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[10px] font-bold uppercase tracking-widest border border-slate-100">Göğüs & Kalp</button>
                    <button onclick="filterCategory('Karın & Sindirim')" class="cat-btn shrink-0 px-5 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[10px] font-bold uppercase tracking-widest border border-slate-100">Karın & Sindirim</button>
                    <button onclick="filterCategory('Deri & Estetik')" class="cat-btn shrink-0 px-5 py-2 rounded-full bg-white dark:bg-darkSurface text-slate-500 text-[10px] font-bold uppercase tracking-widest border border-slate-100">Deri & Estetik</button>
                </div>

                <div class="relative">
                    <input type="text" id="symptom-search" oninput="renderSymptoms()" class="w-full p-6 pl-14 rounded-3xl bg-white dark:bg-darkSurface border-2 border-slate-100 dark:border-slate-800 outline-none focus:border-primary shadow-xl text-lg transition-all" placeholder="Şikayetinizi yazın (Örn: Saç dökülmesi, Baş dönmesi)...">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-7 text-slate-300"></i>
                </div>
                
                <div id="symptom-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </section>

        <section id="tab-rehber" class="tab-content">
            <div id="disease-list" class="space-y-4 pt-6"></div>
        </section>

        <section id="tab-hesaplar" class="tab-content">
            <div class="max-w-xl mx-auto py-6 bg-white dark:bg-darkSurface p-8 rounded-[2.5rem] shadow-2xl space-y-8 border border-slate-100 dark:border-slate-800">
                <h3 class="text-2xl font-black text-center italic uppercase tracking-tighter">Vücut Kompozisyonu</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 flex gap-4">
                        <button onclick="setGender('E')" id="male-btn" class="flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]">Erkek</button>
                        <button onclick="setGender('K')" id="female-btn" class="flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]">Kadın</button>
                    </div>
                    <div class="space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Yaş</label><input type="number" id="h-age" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                    <div class="space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Boy (cm)</label><input type="number" id="h-height" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                    <div class="col-span-2 space-y-1"><label class="text-[9px] font-black ml-2 uppercase opacity-40">Kilo (kg)</label><input type="number" id="h-weight" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-darkBg border-none outline-none focus:ring-2 focus:ring-primary shadow-inner"></div>
                </div>
                <button onclick="calcHealth()" class="w-full py-5 bg-primary text-white font-black rounded-2xl shadow-xl hover:brightness-110 active:scale-95 transition-all text-xs uppercase tracking-widest">Analizi Başlat</button>
                <div id="h-res" class="hidden pt-10 space-y-8 border-t-2 border-slate-50 dark:border-slate-800 animate-fadeIn">
                    <div class="flex justify-around items-center text-center">
                        <div><div id="bmi-val" class="text-6xl font-black text-primary italic">--</div><div class="text-[9px] font-bold text-slate-400 mt-2 uppercase">VKE</div></div>
                        <div><div id="ideal-val" class="text-xl font-bold text-emerald-500">--</div><div class="text-[9px] font-bold text-slate-400 mt-2 uppercase">Klinik İdeal</div></div>
                    </div>
                    <div id="bmi-status-box" class="p-6 rounded-2xl text-[11px] leading-relaxed border transition-all shadow-sm">--</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-8 bg-slate-900 text-slate-500 text-center border-t border-slate-800">
        <p class="text-[10px] font-bold uppercase tracking-[0.4em]">© 2026 Klinik Karar Destek Sistemi</p>
    </footer>

    <script>
        let currentCategory = 'Tümü';
        let selectedGender = '';

        const db = {
            symptoms: [
                // --- BAŞ & SAÇ (Vazgeçilmezler) ---
                { n: "Aşırı Saç Dökülmesi", c: "Baş & Saç", d: "Dermatoloji", desc: "Günde 100 telden fazla dökülme; stres veya vitamin eksikliği olabilir.", urgent: false },
                { n: "Saç Derisinde Kaşıntı ve Kepek", c: "Baş & Saç", d: "Dermatoloji", desc: "Egzama veya mantar enfeksiyonu belirtisi olabilir.", urgent: false },
                { n: "Baş Dönmesi", c: "Baş & Saç", d: "KBB / Nöroloji", desc: "Denge kaybı ve etrafın dönmesi; tansiyon veya iç kulak kristal sorunu.", urgent: false },
                { n: "Ani Baş Ağrısı (Çok Şiddetli)", c: "Baş & Saç", d: "ACİL", desc: "Hayatınızın en kötü ağrısıysa derhal acile başvurun (Beyin kanaması riski).", urgent: true },
                { n: "Göz Kararması", c: "Baş & Saç", d: "Kardiyoloji", desc: "Özellikle ayağa kalkınca oluşan geçici görme kaybı; düşük tansiyon.", urgent: false },

                // --- GÖĞÜS & KALP ---
                { n: "Göğüste Sıkışma Hissi", c: "Göğüs & Kalp", d: "Kardiyoloji / ACİL", desc: "Sol kola vuran baskı tarzı ağrı; Kalp Krizi riski.", urgent: true },
                { n: "Nefes Darlığı", c: "Göğüs & Kalp", d: "ACİL", desc: "Dinlenme halindeyken bile zor nefes alma; akciğer veya kalp yetmezliği.", urgent: true },
                { n: "Çarpıntı", c: "Göğüs & Kalp", d: "Kardiyoloji", desc: "Kalp atışlarının düzensiz veya çok hızlı hissedilmesi.", urgent: false },

                // --- KARIN & SİNDİRİM ---
                { n: "Sağ Alt Karın Ağrısı", c: "Karın & Sindirim", d: "Genel Cerrahi / ACİL", desc: "Dokunulduğunda artan şiddetli ağrı; Apandisit şüphesi.", urgent: true },
                { n: "Mide Yanması (Reflü)", c: "Karın & Sindirim", d: "Gastroenteroloji", desc: "Ağıza acı su gelmesi ve göğüs arkasında yanma.", urgent: false },
                { n: "Şiddetli Mide Bulantısı", c: "Karın & Sindirim", d: "Dahiliye", desc: "Gıda zehirlenmesi veya mide gribi bulgusu.", urgent: false },

                // --- DERİ & ESTETİK (Hedefin Plastik Cerrahi) ---
                { n: "Yara İzinde Aşırı Büyüme", c: "Deri & Estetik", d: "Plastik Cerrahi", desc: "Ameliyat sonrası dokunun normalden fazla kabarması (Keloid).", urgent: false },
                { n: "Benlerde Şekil Değişimi", c: "Deri & Estetik", d: "Dermatoloji", desc: "Kenarları düzensizleşen ve büyüyen benler; Cilt kanseri taraması.", urgent: true },
                { n: "Ciltte Geçmeyen Kızarıklık", c: "Deri & Estetik", d: "Dermatoloji", desc: "Güneş hassasiyeti veya Rozasea (Gül hastalığı) olabilir.", urgent: false }
            ]
        };

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('active-tab'); el.classList.add('text-slate-500'); });
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab');
            if(id === 'rehber') renderDiseases();
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = 'cat-btn shrink-0 px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest border border-slate-100 dark:bg-darkSurface text-slate-500';
                if(btn.innerText === cat.toUpperCase()) btn.className = 'cat-btn shrink-0 px-5 py-2 rounded-full bg-primary text-white text-[10px] font-bold uppercase tracking-widest shadow-lg';
            });
            renderSymptoms();
        }

        function renderSymptoms() {
            const val = document.getElementById('symptom-search').value.toLowerCase();
            const list = document.getElementById('symptom-list');
            list.innerHTML = "";
            
            const filtered = db.symptoms.filter(s => 
                (currentCategory === 'Tümü' || s.c === currentCategory) && 
                (s.n.toLowerCase().includes(val) || s.desc.toLowerCase().includes(val))
            );

            filtered.forEach(s => {
                const style = s.urgent ? 'border-red-500 bg-red-50 dark:bg-red-900/10' : 'bg-white dark:bg-darkSurface border-slate-100 dark:border-slate-800 shadow-lg';
                list.innerHTML += `<div class="${style} p-5 rounded-3xl border transition-all animate-fadeIn">
                    <div class="flex justify-between mb-2">
                        <span class="text-[8px] bg-primary/10 text-primary px-2 py-0.5 rounded-lg font-black uppercase">${s.d}</span>
                        ${s.urgent ? '<span class="text-[8px] bg-red-600 text-white px-2 py-0.5 rounded-lg font-black animate-pulse">ACİL</span>' : ''}
                    </div>
                    <div class="font-bold text-lg leading-tight">${s.n}</div>
                    <p class="text-[10px] text-slate-500 mt-2 font-medium leading-relaxed">${s.desc}</p>
                </div>`;
            });
        }

        // Başlangıçta render et
        renderSymptoms();

        function setGender(g) { 
            selectedGender = g;
            document.getElementById('male-btn').className = g === 'E' ? 'flex-1 py-4 rounded-2xl border-2 border-primary bg-blue-500/10 text-primary font-black uppercase text-[10px]' : 'flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]';
            document.getElementById('female-btn').className = g === 'K' ? 'flex-1 py-4 rounded-2xl border-2 border-primary bg-pink-500/10 text-primary font-black uppercase text-[10px]' : 'flex-1 py-4 rounded-2xl border-2 border-slate-100 font-black text-slate-400 uppercase text-[10px]';
        }

        function calcHealth() {
            const h = document.getElementById('h-height').value / 100, w = document.getElementById('h-weight').value;
            if(!h || !w || !selectedGender) return alert('Verileri girin.');
            const bmi = (w / (h*h)).toFixed(1);
            document.getElementById('h-res').classList.remove('hidden');
            document.getElementById('bmi-val').innerText = bmi;
            document.getElementById('ideal-val').innerText = `${(18.5*h*h).toFixed(0)}-${(24.9*h*h).toFixed(0)} kg`;
            document.getElementById('bmi-status-box').className = `p-6 rounded-2xl text-[11px] border ${bmi < 25 && bmi >= 18.5 ? 'bg-emerald-50 text-emerald-800' : 'bg-red-50 text-red-800'}`;
            document.getElementById('bmi-status-box').innerHTML = `Sonuç: <strong>${bmi < 25 ? 'Normal' : 'Riskli'}</strong>. Klinik verilerinize göre vücut endeksiniz hesaplanmıştır.`;
        }
    </script>
</body>
</html>
